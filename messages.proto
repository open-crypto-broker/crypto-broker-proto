syntax = "proto3";

package CryptoBroker;

option go_package = "internal/protobuf";

service CryptoGrpc {
  rpc Hash(HashRequest) returns (HashResponse);
  rpc Sign(SignRequest) returns (SignResponse);
}

service CryptoGrpcDev {
  rpc Benchmark(BenchmarkRequest) returns (BenchmarkResponse);
  rpc FakeEndpoint(FakeEndpointRequest) returns (FakeEndpointResponse);
}

// Trace context for manual propagation
message TraceContext {
  string traceId=1;
  string spanId=2;
  string traceFlags=3;
  string traceState=4;
  string correlationId=5;
}

// Metadata shared across all methods
message Metadata {
  string id=1;
  optional TraceContext traceContext=3;
}

// Message for a Benchmark Request
message BenchmarkRequest {
  Metadata metadata=1;
}

// Response for a Benchmark Request
message BenchmarkResponse {
  string benchmarkResults=1;
  Metadata metadata=2;
}

enum HashOutputFormat {
  HEX = 0;
  RAW = 1;
}

// Message for a Hash Request
message HashRequest {
  string profile=1;
  bytes input=2;
  Metadata metadata=3;
  HashOutputFormat outputFormat=4;
}

// Response to a Hash Request
message HashResponse {
  string hashAlgorithm=2;
  Metadata metadata=3;
  oneof hashValue {
    string hashValueHex = 4;
    bytes hashValueRaw  = 5;
  }
}

enum SignOutputFormat {
  DER = 0;
  PEM = 1;
}

// Message for a CSR (Certificate Signing Request)
message SignRequest {
  string profile=1;
  string csr=2;
  string caPrivateKey=3;
  string caCert=4;
  Metadata metadata=5;
  optional uint64 validNotBefore=6;
  optional uint64 validNotAfter=7;
  optional string subject=8;
  repeated string crlDistributionPoints=9;
  SignOutputFormat outputFormat=10;
}

// Response to a Sign Request
message SignResponse {
  Metadata metadata=2;
  oneof signedCertificate {
    string signedCertificatePem = 3;
    bytes signedCertificateDer  = 4;
  }
}

// Message for a Fake Endpoint Request
message FakeEndpointRequest {
  Metadata metadata=1;
}

// Response to a Fake Endpoint Request
message FakeEndpointResponse {
  string message=1;
  Metadata metadata=2;
}
