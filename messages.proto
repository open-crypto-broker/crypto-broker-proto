syntax = "proto3";

package CryptoBroker;

option go_package = "internal/protobuf";

//
// Public crypto service definition
//
service CryptoGrpc {
  rpc HashData(HashDataRequest) returns (HashDataResponse);
  rpc SignCertificate(SignCertificateRequest) returns (SignCertificateResponse);
}

// Metadata shared across all methods
message Metadata {
  string id=1;
  optional TraceContext traceContext=3;
}

// Trace context for manual propagation
message TraceContext {
  string traceId=1;
  string spanId=2;
  string traceFlags=3;
  string traceState=4;
  string correlationId=5;
}

// Output formats
enum HashOutputFormat {
  HEX = 0;
  RAW = 1;
}

enum SignOutputFormat {
  DER = 0;
  PEM = 1;
}

// HashData request and response messages
message HashDataRequest {
  string profile=1;
  bytes input=2;
  Metadata metadata=3;
  HashOutputFormat outputFormat=4;
}

message HashDataResponse {
  string hashAlgorithm=2;
  Metadata metadata=3;
  oneof hashValue {
    string hashValueHex = 4;
    bytes hashValueRaw  = 5;
  }
}

// SignCertificate response and request messages
message SignCertificateRequest {
  string profile=1;
  string csr=2;
  string caPrivateKey=3;
  string caCert=4;
  Metadata metadata=5;
  optional uint64 validNotBefore=6;
  optional uint64 validNotAfter=7;
  optional string subject=8;
  repeated string crlDistributionPoints=9;
  SignOutputFormat outputFormat=10;
}

// Response to a SignCertificate Request
message SignCertificateResponse {
  Metadata metadata=2;
  oneof signedCertificate {
    string pem = 3;
    bytes der  = 4;
  }
}

//
// Internal development service definition
//
service CryptoGrpcDev {
  rpc Benchmark(BenchmarkRequest) returns (BenchmarkResponse);
  rpc FakeEndpoint(FakeEndpointRequest) returns (FakeEndpointResponse);
}

// Benchmark request and response messages
message BenchmarkRequest {
  Metadata metadata=1;
}

message BenchmarkResponse {
  string benchmarkResults=1;
  Metadata metadata=2;
}

// FakeEndpoint request and response messages
message FakeEndpointRequest {
  Metadata metadata=1;
}

message FakeEndpointResponse {
  string message=1;
  Metadata metadata=2;
}
